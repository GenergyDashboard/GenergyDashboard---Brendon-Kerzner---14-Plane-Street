name: Update Solar Dashboard

on:
  schedule:
    # Run every 30 minutes during daylight hours (SAST = UTC+2)
    # 04:00-18:00 SAST = 02:00-16:00 UTC
    - cron: '*/30 2-16 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openpyxl playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run VRM Scraper
        env:
          VRM_EMAIL: ${{ secrets.VRM_EMAIL }}
          VRM_PASSWORD: ${{ secrets.VRM_PASSWORD }}
        run: python scraper.py

      - name: Append Yesterday to Lifetime (if available)
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y%m%d 2>/dev/null || date -v-1d +%Y%m%d)
          YESTERDAY_FILE="downloads/14PlanestreetJBay_kwh_${YESTERDAY}.xlsx"

          if [ -f "$YESTERDAY_FILE" ]; then
            echo "Appending yesterday's data to lifetime..."
            python update_lifetime.py \
              --daily "$YESTERDAY_FILE" \
              --lifetime "data/Monthly_Data_Excluding_today.xlsx"
          else
            echo "No yesterday file found (${YESTERDAY_FILE}), skipping lifetime update"
          fi

      - name: Process Data
        run: |
          # Find today's downloaded file
          TODAY=$(date +%Y%m%d)
          TODAY_FILE="downloads/14PlanestreetJBay_kwh_${TODAY}.xlsx"

          if [ ! -f "$TODAY_FILE" ]; then
            echo "ERROR: Today's file not found: $TODAY_FILE"
            ls -la downloads/
            exit 1
          fi

          echo "Processing: $TODAY_FILE"
          python process_data.py \
            --today "$TODAY_FILE" \
            --lifetime "data/Monthly_Data_Excluding_today.xlsx" \
            --output "data/dashboard_data.json"

      - name: Fetch Irradiation Data
        run: |
          curl -sf "https://api.open-meteo.com/v1/forecast?latitude=-34.02740088881076&longitude=24.930675325808807&hourly=direct_radiation&forecast_days=1" \
            -o data/irradiation_data.json || echo "Irradiation fetch failed (non-fatal)"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/irradiation_data.json data/Monthly_Data_Excluding_today.xlsx || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update solar data $(date +'%Y-%m-%d %H:%M') SAST"
          git push
